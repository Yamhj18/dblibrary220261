<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>BIBLIO-TECH</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Arial, sans-serif; }
  body {
    min-height: 100vh;
    background: linear-gradient(135deg, #1e3a5f, #2c5282);
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .container {
    background: #fff;
    width: 480px;
    border-radius: 10px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.25);
    overflow: hidden;
  }
  header {
    background: #1e3a5f;
    color: #fff;
    padding: 22px 28px;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  header .logo {
    width: 34px; height: 34px;
    background: #fff;
    border-radius: 6px;
    display: flex; align-items: center; justify-content: center;
    color: #1e3a5f; font-weight: bold; font-size: 18px;
  }
  header h1 { font-size: 20px; letter-spacing: 1px; }
  nav {
    display: flex;
    flex-direction: column;
    padding: 28px;
    gap: 14px;
  }
  nav a {
    text-decoration: none;
    background: #f4f6f8;
    color: #1e3a5f;
    padding: 16px 20px;
    border-radius: 8px;
    font-weight: 600;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border: 1px solid #e0e4e8;
    transition: 0.2s;
  }
  nav a:hover { background: #e8edf3; border-color: #1e3a5f; }
  nav a span.arrow { color: #2c5282; font-size: 18px; }
  footer {
    text-align: center;
    padding: 14px;
    font-size: 12px;
    color: #888;
    border-top: 1px solid #eee;
  }
</style>
</head>
<body>
  <div class="container">
    <header>
      <div class="logo">B</div>
      <h1>BIBLIO-TECH</h1>
    </header>
    <nav>
      <a href="login.html">Iniciar Sesión / Registro <span class="arrow">&#8594;</span></a>
      <a href="devoluciones.html">Módulo de Devoluciones <span class="arrow">&#8594;</span></a>
      <a href="#">Catálogo de Libros <span class="arrow">&#8594;</span></a>
      <a href="#">Reportes <span class="arrow">&#8594;</span></a>
    </nav>
    <footer>Sistema de Biblioteca UNAMBA &copy; 2026</footer>
  </div>
</body>
</html>
